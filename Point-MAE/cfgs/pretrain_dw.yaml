optimizer : {
  type: AdamW,
  kwargs: {
  lr : 0.0001,
  weight_decay : 0.05
}}

scheduler: {
  type: CosLR,
  kwargs: {
    epochs: 150,
    initial_epochs : 5
}}

dataset : {
  train : { _base_: /data_hdd/pengzelin/yuhuang/HACL/Point-MAE/cfgs/dataset_configs/H5Cluster.yaml,
            others: {subset: 'train', npoints: 1024}}}

model : {
  NAME: Point_MAE,
  group_size: 32,
  num_group: 256,
  loss: cdl2,
  lambda_struct: 0.01,
  return_loss_dict: true, 
  transformer_config: {
    mask_ratio: 0.6,
    mask_type: 'rand',
    trans_dim: 384,
    encoder_dims: 384,
    depth: 12,
    drop_path_rate: 0.1,
    num_heads: 6,
    decoder_depth: 4,
    decoder_num_heads: 6,
  },
  }

npoints: 4096
total_bs : 96
step_per_update : 1
max_epoch : 150